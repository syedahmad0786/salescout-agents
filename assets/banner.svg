<svg width="1280" height="300" viewBox="0 0 1280 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SaleScout — multi-agent sales research crew">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="50%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#ffa657"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="300" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <text x="80" y="130" font-family="'Cascadia Code','Fira Code',Consolas,monospace" font-size="56" font-weight="700" fill="#e6edf3">salescout<tspan fill="url(#glow)">-agents</tspan></text>
  <text x="82" y="172" font-family="'Cascadia Code','Fira Code',Consolas,monospace" font-size="20" fill="#8b949e">a multi-agent sales research crew · LangGraph · runs free on Ollama</text>

  <!-- agent pipeline chips -->
  <g font-family="'Cascadia Code','Fira Code',Consolas,monospace" font-size="16" font-weight="600">
    <rect x="82"  y="205" width="150" height="40" rx="20" fill="#0d1117" stroke="#1f6feb" stroke-width="2"/>
    <text x="157" y="230" text-anchor="middle" fill="#79c0ff">researcher</text>

    <text x="252" y="231" fill="#8b949e" font-size="20">&#8594;</text>

    <rect x="286" y="205" width="130" height="40" rx="20" fill="#0d1117" stroke="#7ee787" stroke-width="2"/>
    <text x="351" y="230" text-anchor="middle" fill="#7ee787">analyst</text>

    <text x="436" y="231" fill="#8b949e" font-size="20">&#8594;</text>

    <rect x="470" y="205" width="120" height="40" rx="20" fill="#0d1117" stroke="#ffa657" stroke-width="2"/>
    <text x="530" y="230" text-anchor="middle" fill="#ffa657">writer</text>

    <text x="610" y="231" fill="#8b949e" font-size="20">&#8594;</text>

    <text x="644" y="231" fill="#d2a8ff" font-size="16">outreach brief + emails</text>
  </g>

  <!-- radar motif -->
  <g transform="translate(1090, 150)" stroke="#30363d" fill="none">
    <circle r="95"/>
    <circle r="65"/>
    <circle r="35"/>
    <line x1="-95" y1="0" x2="95" y2="0"/>
    <line x1="0" y1="-95" x2="0" y2="95"/>
    <path d="M0 0 L78 -55 A95 95 0 0 0 33 -89 Z" fill="#1f6feb" fill-opacity="0.35" stroke="none"/>
    <circle cx="45" cy="-30" r="5" fill="#7ee787" stroke="none"/>
    <circle cx="-38" cy="42" r="4" fill="#ffa657" stroke="none"/>
    <circle cx="-20" cy="-60" r="3" fill="#79c0ff" stroke="none"/>
  </g>
</svg>
